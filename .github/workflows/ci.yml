name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    # Pinned to windows-2025 ahead of the windows-latest image flip from
    # Server 2022 (VS2022) to Server 2025 (VS2026) on 2026-06-15: pinning
    # before the flip surfaces any incompatibility on a controlled schedule
    # rather than on flip day. windows-2022 is the fallback if the 2025
    # image regresses.
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json

      - name: Build
        run: dotnet build src/InstallerClean/InstallerClean.csproj -p:RestoreLockedMode=true

      - name: Build CLI
        run: dotnet build src/InstallerClean.Cli/InstallerClean.Cli.csproj -p:RestoreLockedMode=true

      - name: Test
        run: dotnet test src/InstallerClean.Tests/ -p:RestoreLockedMode=true

      - name: Smoke-publish self-contained
        run: dotnet publish src/InstallerClean/InstallerClean.csproj -c Release -r win-x64 --self-contained true -p:RestoreLockedMode=true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -o publish/self-contained

      - name: Smoke-publish framework-dependent
        run: dotnet publish src/InstallerClean/InstallerClean.csproj -c Release -r win-x64 --self-contained false -p:RestoreLockedMode=true -p:PublishSingleFile=true -o publish/framework-dependent

      - name: Smoke-publish CLI framework-dependent
        run: dotnet publish src/InstallerClean.Cli/InstallerClean.Cli.csproj -c Release -r win-x64 --self-contained false -p:RestoreLockedMode=true -p:PublishSingleFile=true -o publish/cli

      - name: Audit vulnerable packages (GUI)
        run: dotnet list src/InstallerClean/InstallerClean.csproj package --vulnerable --include-transitive
        continue-on-error: true

      - name: Audit vulnerable packages (Core)
        run: dotnet list src/InstallerClean.Core/InstallerClean.Core.csproj package --vulnerable --include-transitive
        continue-on-error: true

      - name: Audit vulnerable packages (CLI)
        run: dotnet list src/InstallerClean.Cli/InstallerClean.Cli.csproj package --vulnerable --include-transitive
        continue-on-error: true

      - name: Audit vulnerable packages (Tests)
        run: dotnet list src/InstallerClean.Tests/InstallerClean.Tests.csproj package --vulnerable --include-transitive
        continue-on-error: true
